<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - CRM Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #2563eb;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.85;
        }

        header a:hover { opacity: 1; }

        .container {
            max-width: 520px;
            margin: 48px auto;
            padding: 0 24px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .field {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .hint {
            display: block;
            color: #6b7280;
            font-size: 13px;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input:focus { border-color: #2563eb; }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
        }

        button[type="submit"]:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <header>
        <span>CRM Agent</span>
        <a href="/">Back to Chat</a>
    </header>

    <div class="container">
        <h1>Settings</h1>
        <p class="subtitle">Enter your credentials to get started. They're stored in your browser session only.</p>

        <form method="POST" action="/settings">
            <div class="field">
                <label for="anthropic_api_key">Anthropic API Key</label>
                <span class="hint">Get one at <a href="https://console.anthropic.com/" target="_blank">console.anthropic.com</a></span>
                <input type="password" id="anthropic_api_key" name="anthropic_api_key" placeholder="sk-ant-..." required>
            </div>

            <div class="field">
                <label for="gmail_address">Gmail Address</label>
                <span class="hint">The Gmail account you want to search.</span>
                <input type="text" id="gmail_address" name="gmail_address" placeholder="you@gmail.com">
            </div>

            <div class="field">
                <label for="gmail_password">Gmail App Password</label>
                <span class="hint">
                    Generate one at Google Account &rarr; Security &rarr; App Passwords.
                    Not your regular password.
                </span>
                <input type="password" id="gmail_password" name="gmail_password" placeholder="xxxx xxxx xxxx xxxx">
            </div>

            <button type="submit">Save &amp; Start Chatting</button>
        </form>
    </div>
</body>
</html>
