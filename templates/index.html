<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: #2563eb;
            color: white;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header a {
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.85;
        }

        header a:hover { opacity: 1; }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .msg.user {
            align-self: flex-end;
            background: #2563eb;
            color: white;
        }

        .msg.assistant {
            align-self: flex-start;
            background: white;
            border: 1px solid #e5e7eb;
        }

        .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
            margin: 12px 0 6px;
            font-size: 1em;
            font-weight: 600;
        }

        .msg.assistant p { margin: 6px 0; }
        .msg.assistant ul, .msg.assistant ol { margin: 6px 0 6px 20px; }
        .msg.assistant code {
            background: #f3f4f6;
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .msg.assistant pre {
            background: #f3f4f6;
            padding: 10px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 6px 0;
        }
        .msg.assistant pre code {
            background: none;
            padding: 0;
        }
        .msg.assistant table {
            border-collapse: collapse;
            margin: 8px 0;
            width: 100%;
            font-size: 0.9em;
        }
        .msg.assistant th, .msg.assistant td {
            border: 1px solid #d1d5db;
            padding: 6px 10px;
            text-align: left;
        }
        .msg.assistant th {
            background: #f3f4f6;
            font-weight: 600;
        }

        .msg.thinking {
            align-self: flex-start;
            background: white;
            border: 1px solid #e5e7eb;
            color: #9ca3af;
            font-style: italic;
        }

        #input-area {
            border-top: 1px solid #e5e7eb;
            padding: 16px 24px;
            background: white;
            display: flex;
            gap: 12px;
        }

        #input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        #input-area input:focus { border-color: #2563eb; }

        #input-area button {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
        }

        #input-area button:hover { background: #1d4ed8; }
        #input-area button:disabled { background: #93c5fd; cursor: not-allowed; }
    </style>
</head>
<body>
    <header>
        <span>CRM Agent</span>
        <a href="/settings">Settings</a>
    </header>
    <div id="chat"></div>
    <div id="input-area">
        <input type="text" id="msg" placeholder="Ask about your emails or connections..." autofocus>
        <button id="send" onclick="send()">Send</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // Redirect to settings if credentials aren't configured
        fetch("/settings/status")
            .then(r => r.json())
            .then(data => { if (!data.configured) window.location.href = "/settings"; });

        const chat = document.getElementById("chat");
        const input = document.getElementById("msg");
        const btn = document.getElementById("send");

        input.addEventListener("keydown", e => { if (e.key === "Enter" && !btn.disabled) send(); });

        function addMsg(text, cls) {
            const div = document.createElement("div");
            div.className = "msg " + cls;
            if (cls === "assistant") {
                div.innerHTML = marked.parse(text);
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, "user");
            input.value = "";
            btn.disabled = true;

            const thinking = addMsg("Thinking...", "thinking");

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({message: text}),
                });
                const data = await res.json();
                thinking.remove();
                addMsg(data.response, "assistant");
            } catch (err) {
                thinking.remove();
                addMsg("Failed to reach the server.", "assistant");
            }

            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
